{% extends 'accounts/base_nav.html' %}

{% block content %}
<div class="profile-page-wrapper" style="max-width: 550px; margin: 50px auto; padding: 0 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">
    
    <div class="profile-card" style="background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 40px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="width: 80px; height: 80px; background-color: #f1f5f9; border: 2px solid #cbd5e1; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px auto; font-size: 2em;">
                👤
            </div>
            <h2 style="margin: 0 0 4px 0; color: #1e293b; font-size: 1.6em; font-weight: 800; letter-spacing: -0.5px;">
                @{{ user.username }}
            </h2>
            <p style="color: #64748b; font-size: 0.95em; margin: 0;">
                {{ user.email|default:"No email provided" }}
            </p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div style="background-color: #d1fae5; color: #065f46; padding: 12px 16px; border-radius: 8px; margin-bottom: 25px; font-size: 0.9em; font-weight: 600; border: 1px solid #a7f3d0; display: flex; align-items: center; gap: 8px;">
                    <span>✨</span> {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'user_profile' %}" style="display: flex; flex-direction: column; gap: 20px;">
            {% csrf_token %}
            
            <div style="display: flex; gap: 15px;">
                <div style="display: flex; flex-direction: column; gap: 6px; flex: 1;">
                    <label for="gender" style="font-weight: 600; font-size: 0.85em; color: #475569; text-transform: uppercase; letter-spacing: 0.5px;">Gender</label>
                    <select id="gender" name="gender" style="padding: 12px 14px; background-color: #ffffff; border: 1px solid #cbd5e1; border-radius: 8px; color: #1e293b; font-size: 0.95em; font-weight: 600; width: 100%; cursor: pointer;">
                        <option value="NS" {% if profile.gender == 'NS' %}selected{% endif %}>Not Specified</option>
                        <option value="M" {% if profile.gender == 'M' %}selected{% endif %}>Male</option>
                        <option value="F" {% if profile.gender == 'F' %}selected{% endif %}>Female</option>
                    </select>
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 6px; flex: 1;">
                    <label for="interested_in" style="font-weight: 600; font-size: 0.85em; color: #475569; text-transform: uppercase; letter-spacing: 0.5px;">Seeking</label>
                    <select id="interested_in" name="interested_in" style="padding: 12px 14px; background-color: #ffffff; border: 1px solid #cbd5e1; border-radius: 8px; color: #1e293b; font-size: 0.95em; font-weight: 600; width: 100%; cursor: pointer;">
                        <option value="E" {% if profile.interested_in == 'E' %}selected{% endif %}>Everyone</option>
                        <option value="M" {% if profile.interested_in == 'M' %}selected{% endif %}>Male</option>
                        <option value="F" {% if profile.interested_in == 'F' %}selected{% endif %}>Female</option>
                    </select>
                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 6px;">
                <label for="bio" style="font-weight: 600; font-size: 0.85em; color: #475569; text-transform: uppercase; letter-spacing: 0.5px;">
                    About Me / Bio
                </label>
                <textarea id="bio" name="bio" rows="4" placeholder="Update your movie tastes, favorite directors, or what makes a perfect cinema date..." style="padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95em; color: #1e293b; background-color: #ffffff; resize: vertical; font-family: inherit; line-height: 1.5; transition: border-color 0.15s ease;" onfocus="this.style.borderColor='#007bff'; this.style.outline='none';" onblur="this.style.borderColor='#cbd5e1';">{{ profile.bio|default_if_none:"" }}</textarea>
            </div>

            <button type="submit" style="background-color: #007bff; color: #ffffff; border: none; padding: 14px; border-radius: 8px; font-size: 1em; font-weight: 700; cursor: pointer; transition: background-color 0.15s ease; box-shadow: 0 4px 6px -1px rgba(0, 123, 255, 0.15);" onmouseover="this.style.backgroundColor='#0056b3';" onmouseout="this.style.backgroundColor='#007bff';">
                Save Changes
            </button>
        </form>

    </div>
</div>
{% endblock %}
