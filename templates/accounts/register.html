{% extends 'accounts/base_nav.html' %}

{% block content %}
<div class="register-page-wrapper" style="max-width: 480px; margin: 50px auto; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">
    
    <!-- Sign Up Form Card Block Container -->
    <div class="auth-card" style="background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 40px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);">
        
        <h2 style="margin: 0 0 8px 0; color: #1e293b; text-align: center; font-size: 1.8em; font-weight: 800; letter-spacing: -0.5px;">
            Create Your Account
        </h2>
        <p style="text-align: center; color: #64748b; font-size: 0.95em; margin: 0 0 30px 0;">
            Join the community and find your film match.
        </p>
        
        {% if error %}
            <!-- Dynamic Error Feedback Alert Banner -->
            <div style="background-color: #fef2f2; color: #991b1b; padding: 12px 16px; border-radius: 8px; margin-bottom: 25px; font-size: 0.9em; font-weight: 500; border: 1px solid #fee2e2; display: flex; align-items: center; gap: 8px;">
                <span>⚠️</span> {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="{% url 'register' %}" style="display: flex; flex-direction: column; gap: 20px;">
            {% csrf_token %}
            
            <!-- Username Input Field Stack Container -->
            <div style="display: flex; flex-direction: column; gap: 6px;">
                <label for="username" style="font-weight: 600; font-size: 0.85em; color: #475569; text-transform: uppercase; letter-spacing: 0.5px;">Username *</label>
                <input type="text" id="username" name="username" required autocomplete="username" style="padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95em; color: #1e293b; background-color: #f8fafc; font-family: inherit; transition: all 0.15s ease;" onfocus="this.style.borderColor='#007bff'; this.style.backgroundColor='#ffffff'; this.style.outline='none';" onblur="this.style.borderColor='#cbd5e1'; this.style.backgroundColor='#f8fafc';">
            </div>

            <!-- Email Address Input Field Stack Container -->
            <div style="display: flex; flex-direction: column; gap: 6px;">
                <label for="email" style="font-weight: 600; font-size: 0.85em; color: #475569; text-transform: uppercase; letter-spacing: 0.5px;">Email Address</label>
                <input type="email" id="email" name="email" autocomplete="email" style="padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95em; color: #1e293b; background-color: #f8fafc; font-family: inherit; transition: all 0.15s ease;" onfocus="this.style.borderColor='#007bff'; this.style.backgroundColor='#ffffff'; this.style.outline='none';" onblur="this.style.borderColor='#cbd5e1'; this.style.backgroundColor='#f8fafc';">
            </div>

            <!-- Password Mask Input Field Stack Container -->
            <div style="display: flex; flex-direction: column; gap: 6px;">
                <label for="password" style="font-weight: 600; font-size: 0.85em; color: #475569; text-transform: uppercase; letter-spacing: 0.5px;">Password *</label>
                <input type="password" id="password" name="password" required autocomplete="new-password" style="padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95em; color: #1e293b; background-color: #f8fafc; font-family: inherit; transition: all 0.15s ease;" onfocus="this.style.borderColor='#007bff'; this.style.backgroundColor='#ffffff'; this.style.outline='none';" onblur="this.style.borderColor='#cbd5e1'; this.style.backgroundColor='#f8fafc';">
            </div>

            <!-- Profile Demographic Parameters Symmetrical Row Wrapper -->
            <div style="display: flex; gap: 15px;">
                <!-- Gender Identity Field Selection -->
                <div style="display: flex; flex-direction: column; gap: 6px; flex: 1;">
                    <label for="gender" style="font-weight: 600; font-size: 0.85em; color: #475569; text-transform: uppercase; letter-spacing: 0.5px;">My Gender *</label>
                    <select id="gender" name="gender" required style="padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95em; color: #1e293b; background: #f8fafc; font-family: inherit; cursor: pointer; transition: all 0.15s ease;" onfocus="this.style.borderColor='#007bff'; this.style.backgroundColor='#ffffff'; this.style.outline='none';" onblur="this.style.borderColor='#cbd5e1'; this.style.backgroundColor='#f8fafc';">
                        <option value="" disabled selected>Select...</option>
                        <option value="MALE">Male</option>
                        <option value="FEMALE">Female</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>

                <!-- Match Preferences Field Selection Area -->
                <div style="display: flex; flex-direction: column; gap: 6px; flex: 1;">
                    <label for="interested_in" style="font-weight: 600; font-size: 0.85em; color: #475569; text-transform: uppercase; letter-spacing: 0.5px;">Interested In *</label>
                    <select id="interested_in" name="interested_in" required style="padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95em; color: #1e293b; background: #f8fafc; font-family: inherit; cursor: pointer; transition: all 0.15s ease;" onfocus="this.style.borderColor='#007bff'; this.style.backgroundColor='#ffffff'; this.style.outline='none';" onblur="this.style.borderColor='#cbd5e1'; this.style.backgroundColor='#f8fafc';">
                        <option value="" disabled selected>Looking for...</option>
                        <option value="FEMALE">Females</option>
                        <option value="MALE">Males</option>
                        <option value="ANY">Everyone</option>
                    </select>
                </div>
            </div>

            <!-- Profile Narrative Description Input Container -->
            <div style="display: flex; flex-direction: column; gap: 6px;">
                <label for="bio" style="font-weight: 600; font-size: 0.85em; color: #475569; text-transform: uppercase; letter-spacing: 0.5px;">Short Bio</label>
                <textarea id="bio" name="bio" rows="3" placeholder="What are your favorite directors or go-to movie genres? Tell us here..." style="padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95em; color: #1e293b; background-color: #f8fafc; resize: vertical; font-family: inherit; transition: all 0.15s ease;" onfocus="this.style.borderColor='#007bff'; this.style.backgroundColor='#ffffff'; this.style.outline='none';" onblur="this.style.borderColor='#cbd5e1'; this.style.backgroundColor='#f8fafc';"></textarea>
            </div>

            <!-- Action Form Secure Submission Button Trigger Component -->
            <button type="submit" style="background-color: #ef4444; color: #ffffff; border: none; padding: 14px; border-radius: 8px; font-size: 1em; font-weight: 700; cursor: pointer; margin-top: 5px; box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2); transition: background-color 0.15s ease;" onmouseover="this.style.backgroundColor='#dc2626';" onmouseout="this.style.backgroundColor='#ef4444';">
                Sign Up & Discover Matches
            </button>
        </form>

        <hr style="border: 0; border-top: 1px solid #f1f5f9; margin: 30px 0 20px 0;">

        <!-- Toggle Alternate Authentication Mode Link Panel Base -->
        <div style="text-align: center; font-size: 0.95em; color: #64748b;">
            Already have an account? <a href="{% url 'login' %}" style="color: #007bff; text-decoration: none; font-weight: 600;" onmouseover="this.style.textDecoration='underline';" onmouseout="this.style.textDecoration='none';">Log In here</a>
        </div>
    </div>
</div>
{% endblock %}
